<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixSha’a | עבודה לפי שעה</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      direction: rtl;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, #ffffff, #f1f5f9);
    }

    .box {
      max-width: 850px;
      background: white;
      padding: 50px 30px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #111;
    }

    .tagline {
      font-size: 22px;
      color: #f5a400;
      font-weight: bold;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 44px;
      margin: 20px 0;
      line-height: 1.2;
    }

    p {
      font-size: 20px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      display: inline-block;
    }

    .btn-main {
      background: #111;
      color: white;
    }

    .btn-second {
      background: #f5a400;
      color: #111;
    }

    .services {
      margin-top: 35px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .service {
      background: #f8fafc;
      border-radius: 16px;
      padding: 18px;
      font-size: 17px;
      font-weight: bold;
    }

    .soon {
      margin-top: 35px;
      font-size: 18px;
      color: #777;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 32px;
      }

      .logo {
        font-size: 34px;
      }

      p {
        font-size: 18px;
      }

      .services {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="box">
      <div class="logo">FixSha’a</div>
      <div class="tagline">עבודה לפי שעה</div>

      <h1>שיפוצים ותיקונים לבית — בשקיפות, לפי שעה</h1>

      <p>
        בקרוב תוכלו להזמין בעלי מקצוע לעבודות תיקון, ריצוף, שיפוצים ושדרוגים לבית,
        עם תשלום ברור לפי זמן העבודה וללא הפתעות.
      </p>

      <div class="buttons">
        <a class="btn btn-main" href="https://wa.me/972000000000">צור קשר בוואטסאפ</a>
        <a class="btn btn-second" href="#services">השירותים שלנו</a>
      </div>

      <div class="services" id="services">
        <div class="service">תיקונים לבית</div>
        <div class="service">ריצוף ושיפוצים</div>
        <div class="service">עבודה לפי שעה</div>
      </div>

      <div class="soon">
        Coming Soon | قريبًا | בקרוב
      </div>
    </div>
  </section>
</body>
</html>
